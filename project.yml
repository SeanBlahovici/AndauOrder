name: AndauOrder
options:
  bundleIdPrefix: com.andaumedical
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: true
    GENERATE_INFOPLIST_FILE: true

targets:
  AndauOrder_iOS:
    type: application
    platform: iOS
    sources:
      - path: AndauOrder
        excludes:
          - "**/.DS_Store"
    resources:
      - path: AndauOrder/Resources/Assets.xcassets
      - path: AndauOrder/Resources/ProductCatalog.json
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andaumedical.order
        PRODUCT_NAME: AndauOrder
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  AndauOrder_macOS:
    type: application
    platform: macOS
    sources:
      - path: AndauOrder
        excludes:
          - "**/.DS_Store"
    resources:
      - path: AndauOrder/Resources/Assets.xcassets
      - path: AndauOrder/Resources/ProductCatalog.json
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andaumedical.order
        PRODUCT_NAME: AndauOrder
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  AndauOrderTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AndauOrderTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AndauOrder_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andaumedical.order.tests

  AndauOrderTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AndauOrderTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AndauOrder_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andaumedical.order.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AndauOrder.app/Contents/MacOS/AndauOrder"
        BUNDLE_LOADER: "$(TEST_HOST)"
